<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
<title>Kiwi Crossword</title>
<style>
  :root {
    --rose:      #e8445a;
    --rose-dark: #c03050;
    --rose-pale: #f8c0c8;
    --bg:        #e8445a;
    --cell-active: #ffd0d8;
    --black-cell:  #c03050;
    --radius:    14px;
    --radius-sm: 10px;
    --shadow:    0 4px 20px rgba(160,32,64,0.25);
  }
  /* Colour themes - applied to body */
  body.theme-pink   { --bg:#e8445a; --rose-dark:#c03050; --rose-pale:#f8c0c8; --black-cell:#b02848; --cell-active:#ffd0d8; --shadow:0 4px 20px rgba(160,32,64,0.25); }
  body.theme-orange { --bg:#e87c30; --rose-dark:#b85c10; --rose-pale:#ffe0c0; --black-cell:#b05a10; --cell-active:#ffe8cc; --shadow:0 4px 20px rgba(180,100,20,0.25); }
  body.theme-purple { --bg:#8b5cf6; --rose-dark:#6d3fd4; --rose-pale:#e8d8ff; --black-cell:#6530c0; --cell-active:#ede0ff; --shadow:0 4px 20px rgba(100,50,200,0.25); }
  body.theme-blue   { --bg:#3b82f6; --rose-dark:#1d5fc4; --rose-pale:#c8e0ff; --black-cell:#1a50b0; --cell-active:#d8eaff; --shadow:0 4px 20px rgba(30,80,180,0.25); }
  body.theme-green  { --bg:#22c55e; --rose-dark:#158a40; --rose-pale:#c0f0d0; --black-cell:#128038; --cell-active:#d0f8e0; --shadow:0 4px 20px rgba(20,130,60,0.25); }
  body.theme-teal   { --bg:#14b8a6; --rose-dark:#0d8a7a; --rose-pale:#b8f0e8; --black-cell:#0a7868; --cell-active:#ccf5ef; --shadow:0 4px 20px rgba(10,120,100,0.25); }

  /* Hidden input to trigger iPad/mobile keyboard */
  #hidden-input {
    position: absolute;
    opacity: 0;
    width: 1px;
    height: 1px;
    top: -9999px; left: -9999px;
    border: none;
    outline: none;
    padding: 0;
    font-size: 16px;
    pointer-events: none;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    min-height: 100dvh;
    color: var(--text-light);
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    padding: 14px 20px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title {
    font-size: clamp(1rem, 4vw, 1.4rem);
    font-weight: 800;
    color: #fff;
    letter-spacing: 0.5px;
  }
  .header-title span { opacity: 0.7; font-weight: 500; font-size: 0.8em; margin-left: 6px; }
  .score-pill {
    background: rgba(255,255,255,0.22);
    border-radius: 20px;
    padding: 5px 16px;
    font-weight: 700;
    font-size: 0.9rem;
    color: #fff;
  }

  /* DIFFICULTY */
  .diff-row {
    display: flex;
    gap: 8px;
    padding: 0 16px 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .diff-btn {
    padding: 6px 16px;
    border-radius: 20px;
    border: 2px solid rgba(255,255,255,0.35);
    background: transparent;
    color: rgba(255,255,255,0.75);
    font-weight: 700;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.18s;
  }
  .diff-btn.active {
    background: #fff;
    color: var(--rose-dark);
    border-color: #fff;
  }
  .diff-btn:hover { opacity: 0.85; }
  .new-btn {
    margin-left: auto;
    padding: 6px 16px;
    border-radius: 20px;
    border: none;
    background: rgba(255,255,255,0.22);
    color: #fff;
    font-weight: 700;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.18s;
  }
  .new-btn:hover { background: rgba(255,255,255,0.32); }

  /* MAIN LAYOUT: desktop side-by-side, mobile stacked */
  .layout {
    display: flex;
    gap: 16px;
    padding: 0 16px 20px;
    align-items: flex-start;
    max-width: 1100px;
    margin: 0 auto;
  }
  @media (max-width: 700px) {
    .layout { flex-direction: column; }
  }

  /* GRID CARD */
  .grid-card {
    background: rgba(255,255,255,0.12);
    border-radius: var(--radius);
    padding: 16px;
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .grid-scroll { overflow: auto; max-width: 100%; }

  #crossword-grid {
    border-collapse: separate;
    border-spacing: 3px;
    margin: 0 auto;
  }
  #crossword-grid td { padding: 0; }

  .cell-black {
    background: var(--black-cell);
    border-radius: 6px;
  }

  .cell-wrap {
    background: #ffffff;
    border: 2.5px solid rgba(255,255,255,0.55);
    border-radius: 8px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, border-color 0.15s;
  }
  .cell-wrap:active { transform: scale(0.93); }
  .cell-wrap.active-word { background: rgba(255,255,255,0.82); border-color: rgba(255,255,255,0.9); }
  .cell-wrap.active { background: #ffffff; border-color: #fff; box-shadow: 0 0 0 3px rgba(255,255,255,0.9); }
  .cell-wrap.correct { background: #c8f0d8; border-color: #5dbb7e; }
  .cell-wrap.incorrect { background: #ffd0d0; border-color: #f07070; }

  .cell-num {
    position: absolute;
    top: 2px; left: 3px;
    font-size: 8px;
    font-weight: 800;
    color: var(--rose-dark);
    line-height: 1;
    pointer-events: none;
  }
  .cell-letter {
    font-size: clamp(0.85rem, 3.5vw, 1.1rem);
    font-weight: 800;
    color: var(--rose-dark);
    text-transform: uppercase;
    user-select: none;
  }
  .cell-num { color: var(--rose-dark); }

  /* ACTION BUTTONS */
  .action-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
  }
  .btn {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    font-weight: 700;
    font-size: 0.85rem;
    transition: all 0.18s;
  }
  .btn:active { transform: scale(0.95); }
  .btn-submit { background: #fff; color: var(--rose-dark); }
  .btn-hint   { background: rgba(255,255,255,0.22); color: #fff; }
  .btn-clear  { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.8); }

  /* RESULT BANNER */
  .banner {
    width: 100%;
    padding: 11px 16px;
    border-radius: var(--radius-sm);
    font-weight: 700;
    font-size: 0.9rem;
    text-align: center;
    display: none;
    background: rgba(255,255,255,0.22);
    color: #fff;
  }
  .banner.show { display: block; }

  /* CLUES PANEL */
  .clues-panel {
    width: 260px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  @media (max-width: 700px) {
    .clues-panel { width: 100%; flex-direction: row; gap: 10px; }
  }
  @media (max-width: 480px) {
    .clues-panel { flex-direction: column; }
  }

  .clues-card {
    background: rgba(255,255,255,0.13);
    border-radius: var(--radius);
    padding: 14px;
    flex: 1;
    min-width: 0;
  }
  .clues-card h3 {
    font-size: 0.75rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
  }
  .clues-list {
    max-height: 220px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.3) transparent;
  }
  @media (max-width: 700px) {
    .clues-list { max-height: 160px; }
  }
  .clue-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 3px;
  }
  .clue-item:hover { background: rgba(255,255,255,0.12); }
  .clue-item.active-clue { background: rgba(255,255,255,0.22); }
  .clue-badge {
    min-width: 22px; height: 22px;
    background: rgba(255,255,255,0.22);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    font-weight: 800;
    color: #fff;
    flex-shrink: 0;
  }
  .clue-text {
    font-size: 0.82rem;
    color: rgba(255,255,255,0.9);
    line-height: 1.5;
  }
  .clue-emoji {
    font-size: 1.6rem;
    display: block;
    margin-bottom: 2px;
    line-height: 1.2;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(160,32,64,0.6);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: #fff;
    border-radius: 24px;
    padding: 40px 32px;
    text-align: center;
    max-width: 340px;
    width: 88%;
    box-shadow: 0 24px 60px rgba(160,32,64,0.3);
  }
  .modal-icon { font-size: 3.5rem; margin-bottom: 12px; }
  .modal-title { font-size: 1.6rem; font-weight: 900; color: var(--rose-dark); margin-bottom: 8px; }
  .modal-sub { color: #888; font-size: 0.95rem; margin-bottom: 24px; line-height: 1.5; }
  .modal-play-btn {
    padding: 14px 36px;
    border-radius: 24px;
    border: none;
    background: var(--rose);
    color: #fff;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.18s;
    box-shadow: 0 6px 20px rgba(232,68,90,0.35);
  }
  .modal-play-btn:hover { background: var(--rose-dark); transform: translateY(-1px); }


</style>
</head>
<body>

<input id="hidden-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
<div class="header">
  <div class="header-title">🥝 Kiwi Crossword <span>NZ Primary</span></div>
  <div class="score-pill" id="score-display">Score: 0</div>
</div>

<div class="diff-row">
  <button class="diff-btn active" data-diff="easy" onclick="setDifficulty('easy')">🌱 Easy</button>
  <button class="diff-btn" data-diff="medium" onclick="setDifficulty('medium')">🌤 Medium</button>
  <button class="diff-btn" data-diff="hard" onclick="setDifficulty('hard')">🌪 Hard</button>
  <button class="new-btn" onclick="newGame()">🔄 New</button>
</div>

<div class="layout">
  <div class="grid-card">
    <div class="grid-scroll">
      <table id="crossword-grid"></table>
    </div>
    <div class="banner" id="banner"></div>
    <div class="action-row">
      <button class="btn btn-submit" onclick="submitAnswer()">✅ Submit</button>
      <button class="btn btn-hint"   onclick="revealHint()">💡 Hint</button>
      <button class="btn btn-clear"  onclick="clearAll()">🗑 Clear</button>
    </div>
  </div>

  <div class="clues-panel">
    <div class="clues-card">
      <h3>→ Across</h3>
      <div class="clues-list" id="clues-across"></div>
    </div>
    <div class="clues-card">
      <h3>↓ Down</h3>
      <div class="clues-list" id="clues-down"></div>
    </div>
  </div>
</div>



<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-icon" id="modal-icon"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub"   id="modal-sub"></div>
    <button class="modal-play-btn" onclick="closeModal()">Play Again 🎉</button>
  </div>
</div>

// ===================== WORD BANK =====================

const DIFFICULTY_COUNT = { easy:[6,8], medium:[10,12], hard:[15,18] };
let currentDifficulty = 'easy';
let grid=[], placedWords=[], selectedCell=null, selectedDirection='across', score=0;
const GRID_SIZE = 15;
const THEMES = ['theme-pink','theme-orange','theme-purple','theme-blue','theme-green','theme-teal'];
let themeIndex = 0;

function applyTheme(){
  document.body.className = THEMES[themeIndex];
}
function nextTheme(){
  themeIndex = (themeIndex + 1) % THEMES.length;
  applyTheme();
}

function setDifficulty(diff) {
  currentDifficulty = diff;
  document.querySelectorAll('.diff-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.diff === diff);
  });
  newGame();
}

function getClue(w) {
  if (currentDifficulty === 'hard') return w.hard;
  // separate leading emoji from text and render emoji large
  const raw = currentDifficulty === 'easy' ? w.easy : w.medium;
  // match one or more leading emoji chars (unicode emoji range)
  const emojiMatch = raw.match(/^((?:\p{Emoji}\uFE0F?\u20E3?|[\u{1F300}-\u{1FFFF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}])+\s*)/u);
  if (emojiMatch) {
    const em = emojiMatch[1].trim();
    const rest = raw.slice(emojiMatch[0].length);
    return `<span class="clue-emoji">${em}</span>${rest}`;
  }
  return raw;
}

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function initGrid(s){return Array.from({length:s},()=>Array(s).fill(null));}

function canPlace(g,word,row,col,dir){
  const len=word.length;
  if(dir==='across'){
    if(col<0||col+len>GRID_SIZE)return false;
    if(col>0&&g[row][col-1]!==null)return false;
    if(col+len<GRID_SIZE&&g[row][col+len]!==null)return false;
    for(let i=0;i<len;i++){
      const c=col+i;
      if(g[row][c]===null){
        if(row>0&&g[row-1][c]!==null)return false;
        if(row<GRID_SIZE-1&&g[row+1][c]!==null)return false;
      } else if(g[row][c]!==word[i])return false;
    }
  } else {
    if(row<0||row+len>GRID_SIZE)return false;
    if(row>0&&g[row-1][col]!==null)return false;
    if(row+len<GRID_SIZE&&g[row+len][col]!==null)return false;
    for(let i=0;i<len;i++){
      const r=row+i;
      if(g[r][col]===null){
        if(col>0&&g[r][col-1]!==null)return false;
        if(col<GRID_SIZE-1&&g[r][col+1]!==null)return false;
      } else if(g[r][col]!==word[i])return false;
    }
  }
  return true;
}

function placeWord(g,word,row,col,dir){
  for(let i=0;i<word.length;i++){
    if(dir==='across')g[row][col+i]=word[i];
    else g[row+i][col]=word[i];
  }
}

function buildCrossword(words){
  let g=initGrid(GRID_SIZE), placed=[];
  const first=words[0];
  const sc=Math.floor((GRID_SIZE-first.word.length)/2), sr=Math.floor(GRID_SIZE/2);
  placeWord(g,first.word,sr,sc,'across');
  placed.push({...first,row:sr,col:sc,dir:'across'});
  for(let wi=1;wi<words.length;wi++){
    const w=words[wi]; let cands=[];
    for(const pw of placed){
      for(let li=0;li<pw.word.length;li++){
        const sl=pw.word[li];
        for(let wi2=0;wi2<w.word.length;wi2++){
          if(w.word[wi2]!==sl)continue;
          let row,col,dir;
          if(pw.dir==='across'){dir='down';row=pw.row-wi2;col=pw.col+li;}
          else{dir='across';row=pw.row+li;col=pw.col-wi2;}
          if(canPlace(g,w.word,row,col,dir))cands.push({row,col,dir});
        }
      }
    }
    if(cands.length){
      const pick=cands[Math.floor(Math.random()*cands.length)];
      placeWord(g,w.word,pick.row,pick.col,pick.dir);
      placed.push({...w,row:pick.row,col:pick.col,dir:pick.dir});
    }
  }
  return{g,placed};
}

function cropGrid(g,placed){
  let minR=GRID_SIZE,maxR=0,minC=GRID_SIZE,maxC=0;
  for(let r=0;r<GRID_SIZE;r++)for(let c=0;c<GRID_SIZE;c++){
    if(g[r][c]!==null){minR=Math.min(minR,r);maxR=Math.max(maxR,r);minC=Math.min(minC,c);maxC=Math.max(maxC,c);}
  }
  const newG=[];
  for(let r=minR;r<=maxR;r++)newG.push(g[r].slice(minC,maxC+1));
  return{g:newG,placed:placed.map(p=>({...p,row:p.row-minR,col:p.col-minC})),rows:maxR-minR+1,cols:maxC-minC+1};
}

function assignNumbers(placed){
  const starts={};
  for(const p of placed){
    const k=p.row+','+p.col;
    if(!starts[k])starts[k]={row:p.row,col:p.col};
  }
  const sorted=Object.values(starts).sort((a,b)=>a.row===b.row?a.col-b.col:a.row-b.row);
  const numMap={};
  sorted.forEach((s,i)=>numMap[s.row+','+s.col]=i+1);
  return numMap;
}

function calcCellSize(){
  // measure actual available width of the grid card
  const gridCard = document.querySelector('.grid-card');
  const availW = gridCard ? gridCard.clientWidth - 32 : window.innerWidth - 48;
  const availH = window.innerHeight * 0.55;
  const cols = grid.length ? grid[0].length : 15;
  const rows = grid.length || 15;
  const byW = Math.floor(availW / cols);
  const byH = Math.floor(availH / rows);
  return Math.max(20, Math.min(48, byW, byH));
}

function newGame(){
  hideBanner();
  document.getElementById('modal').classList.remove('show');
  const [mn,mx]=DIFFICULTY_COUNT[currentDifficulty];
  const count=mn+Math.floor(Math.random()*(mx-mn+1));
  const pool=shuffle([...WORD_BANK]).slice(0,count);
  pool.sort((a,b)=>b.word.length-a.word.length);
  let result;
  for(let a=0;a<6;a++){
    const s=shuffle([...pool]);
    const{g,placed}=buildCrossword(s);
    if(placed.length>=Math.max(3,Math.floor(count*0.6))){result=cropGrid(g,placed);break;}
  }
  if(!result){const s=shuffle([...WORD_BANK]).slice(0,4);s.sort((a,b)=>b.word.length-a.word.length);result=cropGrid(...Object.values(buildCrossword(s)));}
  grid=result.g; placedWords=result.placed;
  selectedCell=null; selectedDirection='across';
  renderGrid(result.rows,result.cols);
  renderClues();
}

function renderGrid(rows,cols){
  const cs=calcCellSize();
  const table=document.getElementById('crossword-grid');
  const numMap=assignNumbers(placedWords);
  const active=new Set();
  for(const p of placedWords)for(let i=0;i<p.word.length;i++){
    if(p.dir==='across')active.add(p.row+','+(p.col+i));
    else active.add((p.row+i)+','+p.col);
  }
  let html='';
  for(let r=0;r<rows;r++){
    html+='<tr>';
    for(let c=0;c<cols;c++){
      if(!active.has(r+','+c)){
        html+=`<td><div class="cell-black" style="width:${cs}px;height:${cs}px"></div></td>`;
      } else {
        const num=numMap[r+','+c];
        html+=`<td><div class="cell-wrap" id="cell-${r}-${c}" style="width:${cs}px;height:${cs}px" onclick="selectCell(${r},${c})">`;
        if(num)html+=`<span class="cell-num">${num}</span>`;
        html+=`<span class="cell-letter" id="letter-${r}-${c}"></span>`;
        html+=`</div></td>`;
      }
    }
    html+='</tr>';
  }
  table.innerHTML=html;
  document.onkeydown=handleKey;
}

function renderClues(){
  const numMap=assignNumbers(placedWords);
  const across=placedWords.filter(p=>p.dir==='across').sort((a,b)=>numMap[a.row+','+a.col]-numMap[b.row+','+b.col]);
  const down=placedWords.filter(p=>p.dir==='down').sort((a,b)=>numMap[a.row+','+a.col]-numMap[b.row+','+b.col]);
  const mkClues=(list,dir)=>list.map(p=>{
    const n=numMap[p.row+','+p.col];
    return`<div class="clue-item" id="clue-${dir}-${n}" onclick="selectClue(${p.row},${p.col},'${dir}')"><span class="clue-badge">${n}</span><span class="clue-text">${getClue(p)}</span></div>`;
  }).join('');
  document.getElementById('clues-across').innerHTML=mkClues(across,'across');
  document.getElementById('clues-down').innerHTML=mkClues(down,'down');
}

function isCellInWord(r,c,p){
  if(p.dir==='across')return p.row===r&&c>=p.col&&c<p.col+p.word.length;
  return p.col===c&&r>=p.row&&r<p.row+p.word.length;
}
function getWordForCell(r,c,dir){return placedWords.find(p=>p.dir===dir&&isCellInWord(r,c,p));}

function selectCell(r,c){
  if(selectedCell&&selectedCell[0]===r&&selectedCell[1]===c){
    const opp=selectedDirection==='across'?'down':'across';
    if(placedWords.some(p=>p.dir===opp&&isCellInWord(r,c,p)))selectedDirection=opp;
  } else {
    selectedCell=[r,c];
    const hasA=placedWords.some(p=>p.dir==='across'&&isCellInWord(r,c,p));
    const hasD=placedWords.some(p=>p.dir==='down'&&isCellInWord(r,c,p));
    if(!hasA&&hasD)selectedDirection='down'; else selectedDirection='across';
  }
  selectedCell=[r,c];
  highlightCells(); highlightClue();
  focusInput();
}

function selectClue(r,c,dir){
  selectedCell=[r,c]; selectedDirection=dir;
  highlightCells(); highlightClue();
  document.getElementById('crossword-grid').scrollIntoView({behavior:'smooth',block:'nearest'});
  focusInput();
}

function highlightCells(){
  document.querySelectorAll('.cell-wrap').forEach(el=>el.classList.remove('active','active-word','correct','incorrect'));
  if(!selectedCell)return;
  const[r,c]=selectedCell;
  const w=getWordForCell(r,c,selectedDirection);
  if(w)for(let i=0;i<w.word.length;i++){
    const wr=w.dir==='across'?w.row:w.row+i, wc=w.dir==='across'?w.col+i:w.col;
    const el=document.getElementById(`cell-${wr}-${wc}`);
    if(el)el.classList.add('active-word');
  }
  const a=document.getElementById(`cell-${r}-${c}`);
  if(a){a.classList.remove('active-word');a.classList.add('active');}
}

function highlightClue(){
  document.querySelectorAll('.clue-item').forEach(el=>el.classList.remove('active-clue'));
  if(!selectedCell)return;
  const numMap=assignNumbers(placedWords);
  const w=getWordForCell(selectedCell[0],selectedCell[1],selectedDirection);
  if(w){const n=numMap[w.row+','+w.col];const el=document.getElementById(`clue-${selectedDirection}-${n}`);if(el){el.classList.add('active-clue');el.scrollIntoView({behavior:'smooth',block:'nearest'});}}
}

function handleKey(e){
  if(!selectedCell)return;
  const[r,c]=selectedCell;
  if(e.key==='Backspace'||e.key==='Delete'){
    const el=document.getElementById(`letter-${r}-${c}`);
    if(el&&el.textContent){el.textContent='';return;}
    moveCursor(-1);
    const el2=document.getElementById(`letter-${selectedCell[0]}-${selectedCell[1]}`);
    if(el2)el2.textContent=''; return;
  }
  if(e.key==='ArrowRight'){selectedDirection='across';moveCursor(1);return;}
  if(e.key==='ArrowLeft'){selectedDirection='across';moveCursor(-1);return;}
  if(e.key==='ArrowDown'){selectedDirection='down';moveCursor(1);return;}
  if(e.key==='ArrowUp'){selectedDirection='down';moveCursor(-1);return;}
  if(e.key==='Tab'){e.preventDefault();cycleWord(e.shiftKey?-1:1);return;}
  if(/^[a-zA-Z]$/.test(e.key)){
    const el=document.getElementById(`letter-${r}-${c}`);
    if(el)el.textContent=e.key.toUpperCase();
    moveCursor(1);
  }
}

function typeKey(k){
  if(!selectedCell)return;
  const[r,c]=selectedCell;
  if(k==='⌫'){
    const el=document.getElementById(`letter-${r}-${c}`);
    if(el&&el.textContent){el.textContent='';return;}
    moveCursor(-1);
    const el2=document.getElementById(`letter-${selectedCell[0]}-${selectedCell[1]}`);
    if(el2)el2.textContent='';
  } else if(k==='↔'){
    const opp=selectedDirection==='across'?'down':'across';
    if(placedWords.some(p=>p.dir===opp&&isCellInWord(r,c,p)))selectedDirection=opp;
    highlightCells();highlightClue();
  } else {
    const el=document.getElementById(`letter-${r}-${c}`);
    if(el)el.textContent=k;
    moveCursor(1);
  }
}

function moveCursor(delta){
  if(!selectedCell)return;
  let[r,c]=selectedCell;
  const rows=grid.length,cols=grid[0].length;
  let nr=r,nc=c;
  if(selectedDirection==='across')nc+=delta; else nr+=delta;
  if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&grid[nr][nc]!==null){selectedCell=[nr,nc];highlightCells();highlightClue();}
}

function cycleWord(delta){
  const sorted=[...placedWords].sort((a,b)=>a.row===b.row?a.col-b.col:a.row-b.row);
  if(!selectedCell){selectClue(sorted[0].row,sorted[0].col,sorted[0].dir);return;}
  const cur=getWordForCell(selectedCell[0],selectedCell[1],selectedDirection);
  const idx=sorted.findIndex(p=>p===cur);
  const next=sorted[(idx+delta+sorted.length)%sorted.length];
  selectClue(next.row,next.col,next.dir);
}

function submitAnswer(){
  hideBanner();
  let correct=0,total=placedWords.length;
  for(const p of placedWords){
    let ok=true;
    for(let i=0;i<p.word.length;i++){
      const r=p.dir==='across'?p.row:p.row+i, c=p.dir==='across'?p.col+i:p.col;
      const el=document.getElementById(`letter-${r}-${c}`);
      if((el?el.textContent.trim().toUpperCase():'')!==p.word[i])ok=false;
    }
    if(ok)correct++;
  }
  if(correct===total){
    score+=total*(currentDifficulty==='hard'?3:currentDifficulty==='medium'?2:1);
    document.getElementById('score-display').textContent='Score: '+score;
    showModal(true,correct,total);
  } else {
    for(const p of placedWords)for(let i=0;i<p.word.length;i++){
      const r=p.dir==='across'?p.row:p.row+i, c=p.dir==='across'?p.col+i:p.col;
      const cEl=document.getElementById(`cell-${r}-${c}`), lEl=document.getElementById(`letter-${r}-${c}`);
      if(!cEl||!lEl)continue;
      const entered=lEl.textContent.trim().toUpperCase();
      if(entered===p.word[i])cEl.classList.add('correct');
      else if(entered)cEl.classList.add('incorrect');
    }
    showBanner(`${correct} of ${total} words correct. Keep going! ✏️`);
  }
}

function revealHint(){
  if(!selectedCell){showBanner('Tap a cell first, then use Hint!');return;}
  const w=getWordForCell(selectedCell[0],selectedCell[1],selectedDirection);
  if(!w)return;
  for(let i=0;i<w.word.length;i++){
    const r=w.dir==='across'?w.row:w.row+i, c=w.dir==='across'?w.col+i:w.col;
    const el=document.getElementById(`letter-${r}-${c}`);
    if(el&&!el.textContent){el.textContent=w.word[i];return;}
  }
}

function clearAll(){
  document.querySelectorAll('.cell-letter').forEach(el=>el.textContent='');
  document.querySelectorAll('.cell-wrap').forEach(el=>el.classList.remove('correct','incorrect'));
  hideBanner();
}

function showBanner(msg){const b=document.getElementById('banner');b.textContent=msg;b.classList.add('show');}
function hideBanner(){document.getElementById('banner').classList.remove('show');}

function showModal(ok,correct,total){
  document.getElementById('modal-icon').textContent= ok?'🎉':'😅';
  document.getElementById('modal-title').textContent= ok?'You did it!':'Almost!';
  document.getElementById('modal-sub').textContent= ok
    ?`All ${total} words correct! Score: ${score}`
    :`${correct} of ${total} words. Give it another go!`;
  document.getElementById('modal').classList.add('show');
}

function closeModal(){document.getElementById('modal').classList.remove('show');nextTheme();newGame();}



let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(()=>{
    if(grid.length){
      renderGrid(grid.length, grid[0].length);
      // restore highlight after re-render
      highlightCells();
      highlightClue();
    }
  }, 80);
});

function focusInput(){
  const inp = document.getElementById('hidden-input');
  if(!inp) return;
  inp.value = '';
  inp.focus();
}

// Handle input from hidden field (iPad soft keyboard)
document.addEventListener('DOMContentLoaded', ()=>{
  const inp = document.getElementById('hidden-input');
  if(!inp) return;

  inp.addEventListener('input', (e)=>{
    if(!selectedCell) return;
    const val = inp.value.replace(/[^a-zA-Z]/g,'');
    if(val.length > 0){
      const ch = val[val.length-1].toUpperCase();
      const[r,c]=selectedCell;
      const el=document.getElementById(`letter-${r}-${c}`);
      if(el) el.textContent=ch;
      moveCursor(1);
    }
    inp.value='';
  });

  inp.addEventListener('keydown', (e)=>{
    if(e.key==='Backspace'){
      if(!selectedCell) return;
      const[r,c]=selectedCell;
      const el=document.getElementById(`letter-${r}-${c}`);
      if(el&&el.textContent){el.textContent='';inp.value='';return;}
      moveCursor(-1);
      const el2=document.getElementById(`letter-${selectedCell[0]}-${selectedCell[1]}`);
      if(el2) el2.textContent='';
      inp.value='';
    }
  });
});

window.onload=()=>{applyTheme();newGame();};
</script>
